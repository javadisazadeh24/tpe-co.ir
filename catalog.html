<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPE Co. | کاتالوگ دیجیتال تعاملی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --gold: #fbbf24;
            --gold-light: #fef08a;
            --bg-page: #ffffff;
            --text-dark: #334155;
            --text-light: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: url('https://www.transparenttextures.com/patterns/cubes.png'), linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* جلوگیری از اسکرول کل صفحه */
        }

        /* ================= OVERLAY انتخاب زبان ================= */
        #lang-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .lang-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
            max-width: 90%;
            width: 400px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .lang-card h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--gold);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .lang-card h2 i { font-size: 2.5rem; color: #fff; }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 15px 30px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .lang-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* ================= کانتینر اصلی Flipbook ================= */
        .catalog-wrapper {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 10px;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .flip-book {
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        /* ================= استایل صفحات ================= */
        .page {
            background: var(--bg-page);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            font-size: 14.5px;
            line-height: 1.8;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
        }

        .page-content {
            padding: 30px;
            height: 100%;
            overflow-y: auto;
            /* اسکرول مخفی برای زیبایی، اما قابل اسکرول */
            scrollbar-width: none; 
        }
        .page-content::-webkit-scrollbar { display: none; }

        /* جلد کتاب */
        .page-cover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            border: none;
        }

        .page-cover::after {
            content: "";
            position: absolute;
            top: 0; bottom: 0; left: 0; width: 40px;
            background: linear-gradient(to right, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }
        
        /* برای صفحات چپ (انگلیسی) سایه شیرازه برعکس میشود */
        html[dir="ltr"] .page-cover::after {
            left: auto; right: 0;
            background: linear-gradient(to left, rgba(255,255,255,0.1), transparent);
        }

        .cover-logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--gold), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .cover-sub {
            font-size: 1.1rem;
            color: #cbd5e1;
            font-weight: 300;
            max-width: 80%;
            margin: 0 auto;
        }

        .swipe-indicator {
            margin-top: auto;
            font-size: 0.9rem;
            color: var(--gold);
            animation: pulse 2s infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        @keyframes pulse {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(-10px); opacity: 1; }
            100% { transform: translateX(0); opacity: 0.5; }
        }
        html[dir="ltr"] .swipe-indicator {
            animation: pulse-ltr 2s infinite;
        }
        @keyframes pulse-ltr {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(10px); opacity: 1; }
            100% { transform: translateX(0); opacity: 0.5; }
        }

        /* المان‌های داخلی صفحات */
        .page-header {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: 0;
            width: 50px;
            height: 2px;
            background: var(--gold);
        }
        html[dir="ltr"] .page-header::after { right: auto; left: 0; }

        .page-header i {
            background: var(--gold-light);
            color: var(--gold);
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 10px;
            font-size: 1.2rem;
        }

        .text-body {
            text-align: justify;
            margin-bottom: 25px;
        }

        /* گالری تصاویر */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card-img {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            aspect-ratio: 4/3;
            cursor: pointer;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card-img:hover img {
            transform: scale(1.1);
        }

        .card-img .caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 15px 10px 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .card-img:hover .caption {
            transform: translateY(0);
        }

        /* لیست‌ها */
        .product-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-list li {
            background: #f8fafc;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
            border: 1px solid #e2e8f0;
        }

        .product-list li:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .product-list li i {
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* شماره صفحه */
        .page-number {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: bold;
        }
        
        /* برای صفحات فرد و زوج، جایگاه شماره صفحه متفاوت است */
        .page:nth-child(even) .page-number { left: 20px; }
        .page:nth-child(odd) .page-number { right: 20px; }
        
        html[dir="ltr"] .page:nth-child(even) .page-number { left: auto; right: 20px; }
        html[dir="ltr"] .page:nth-child(odd) .page-number { right: auto; left: 20px; }

        /* ریسپانسیو */
        @media (max-width: 500px) {
            .page-content { padding: 20px; }
            .cover-logo { font-size: 2.5rem; }
            .page-header { font-size: 1.3rem; }
            .text-body { font-size: 13.5px; }
            .gallery-grid { gap: 10px; }
        }
    </style>
</head>

        let flipBook = null;

        function buildPages(lang) {
            const d = translations[lang];
            const p = [];
            let pageNum = 1;

            const addPageNum = () => `<div class="page-number">${pageNum++}</div>`;

            // Cover
            p.push(`
                <div class="page page-cover">
                    <div class="cover-logo">${d.cover_title}</div>
                    <div class="cover-sub">${d.cover_sub}</div>
                    <div class="swipe-indicator">
                        <i class="fa-solid fa-hand-pointer"></i>
                        <span>${d.swipe}</span>
                    </div>
                </div>
            `);

            // About
            p.push(`
                <div class="page">
                    <div class="page-content">
                        <div class="page-header"><i class="fa-solid fa-building"></i> ${d.about_title}</div>
                        <div class="text-body">${d.about_text}</div>
                        <div class="gallery-grid">

                    </div>

                </div>

            `);

                <div class="page">
                    <div class="page-content">
                        <div class="page-header"><i class="fa-solid fa-cube"></i> ${d.fablab_title}</div>
                        <div class="text-body">${d.fablab_desc}</div>

                    ${addPageNum()}

            // Services & Portfolio

            let portItems = d.portfolio_items.map(item => `<div class="card-img"><img src="${item.img}"><div class="caption">${item.name}</div></div>`).join('');
            
            p.push(`

                    <div class="page-content">

                        <div class="page-header"><i class="fa-solid fa-images"></i> ${d.portfolio_title}</div>
                        <div class="gallery-grid">${portItems}</div>
                    </div>
                    ${addPageNum()}
                </div>
            `);

            // Back Cover (Contact)
            p.push(`
                <div class="page page-cover" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                    <div class="cover-logo" style="font-size:2.5rem; margin-top:auto;">${d.contact_title}</div>
                    <div style="margin: 30px 0; font-size:1.1rem; line-height:2.2; font-weight:300;">${d.contact_info}</div>
                    <div style="font-size: 1.5rem; display:flex; gap:20px; color:var(--gold); margin-bottom:auto;">

        function initCatalog(lang) {
            // Set direction and language
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';
            
            // Hide overlay
            const overlay = document.getElementById('lang-overlay');
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            
            // Show wrapper
            const wrapper = document.getElementById('catalogWrapper');
            wrapper.style.display = 'flex';
            
            // Render pages
            setTimeout(() => {
                const container = document.getElementById('flipbook');
                container.innerHTML = buildPages(lang).join('');
                
                if (flipBook) flipBook.destroy();
                
                flipBook = new St.PageFlip(container, {
                    width: 400,
                    height: 600,
                    size: "stretch",
                    minWidth: 300,
                    maxWidth: 450,
                    minHeight: 450,
                    maxHeight: 700,
                    showCover: true,
                    mobileScrollSupport: false,
                    usePortrait: true, // نمایش تک صفحه‌ای در موبایل
                    maxShadowOpacity: 0.3,
                    flippingTime: 800,
                    useMouseEvents: true
                });
                
                flipBook.loadFromHTML(document.querySelectorAll('.page'));
            }, 300);
        }

        // Preview language text change
        setInterval(() => {
            const spans = document.querySelectorAll('.lang-card h2 span');
            let activeIdx = Array.from(spans).findIndex(s => s.style.display !== 'none');
            spans[activeIdx].style.display = 'none';
            activeIdx = (activeIdx + 1) % spans.length;
            spans[activeIdx].style.display = 'inline';
        }, 2000);
    </script>
</body>
</html>
