                    <div class="gallery-grid">
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=200&h=150&fit=crop" alt="3d printer"><span>3D Printer</span></div>
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1581092795360-fd1ca04f0952?w=200&h=150&fit=crop" alt="laser"><span>Laser Cut</span></div>
                    </div>
                </div>
            `);

            // صفحه محصولات (لیستی)
            let productsHtml = `<div class="page-header"><i class="fa-solid fa-boxes"></i> ${data.products_title}</div><ul class="product-list">`;
            data.products_list.forEach(p => { productsHtml += `<li><i class="fa-solid fa-check-circle"></i> ${p}</li>`; });
            productsHtml += `</ul>`;
            pagesArray.push(`<div class="page">${productsHtml}</div>`);

            // صفحه خدمات (لیستی)
            let servicesHtml = `<div class="page-header"><i class="fa-solid fa-tools"></i> ${data.services_title}</div><ul class="product-list">`;
            data.services_list.forEach(s => { servicesHtml += `<li><i class="fa-solid fa-star-of-life"></i> ${s}</li>`; });
            servicesHtml += `</ul>`;
            pagesArray.push(`<div class="page">${servicesHtml}</div>`);

            // صفحه نمونه کارها (گالری تصاویر)
            let portfolioHtml = `<div class="page-header"><i class="fa-solid fa-images"></i> ${data.portfolio_title}</div><div class="gallery-grid">`;
            data.portfolio_items.forEach(item => {
                portfolioHtml += `<div class="card-img"><img src="${item.img}" alt="${item.name}"><span>${item.name}</span></div>`;
            });
            portfolioHtml += `</div>`;
            pagesArray.push(`<div class="page">${portfolioHtml}</div>`);

            // صفحه تماس و اطلاعات
            pagesArray.push(`
                <div class="page page-cover" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                    <div style="text-align:center;">
                        <div class="cover-logo" style="font-size:2rem;">${data.contact_title}</div>
                        <div style="margin-top:30px; font-size:1rem; line-height:2;">${data.contact_info}</div>
                        <div style="margin-top:40px;"><i class="fa-solid fa-envelope"></i> <i class="fa-brands fa-instagram"></i> <i class="fa-brands fa-linkedin"></i></div>
                        <p style="margin-top:50px;">© TPE Co. - Digital Catalog</p>
                    </div>
                </div>
            `);
            return pagesArray;
        }

        // رندر کتاب با صفحات ساخته شده
        function renderFlipbook(lang) {
            const container = document.getElementById('flipbook');
            if (!container) return;
            const pagesHtml = buildPages(lang);
            container.innerHTML = pagesHtml.join('');
            
            // نابود کردن نمونه قبلی اگر وجود داشت
            if (flipBook && flipBook.destroy) flipBook.destroy();
            
            // راه‌اندازی مجدد StPageFlip
            flipBook = new St.PageFlip(container, {
                width: 450,
                height: 650,
                size: "stretch",
                minWidth: 320,
                maxWidth: 520,
                minHeight: 500,
                maxHeight: 750,
                showCover: true,
                mobileScrollSupport: false,
                swipeDistance: 30,
                startZIndex: 0,
                maxShadowOpacity: 0.5,
                useMouseEvents: true,
                autoSize: true
            });
            flipBook.loadFromHTML(document.querySelectorAll('.page'));
        }

        // تابع اصلی راه‌اندازی کاتالوگ پس از انتخاب زبان
        function initCatalog(lang) {
            currentLang = lang;
            // تنظیم جهت صفحه و نمایش زبان صحیح
            document.documentElement.lang = lang;
            if (lang === 'fa' || lang === 'ar') {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }
            // نمایش صحیح عناصر زبان در overlay (فقط برای زیبایی)
            document.querySelectorAll('.fa, .en, .ar').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.' + lang).forEach(el => el.style.display = 'inline-block');
            
            const overlay = document.getElementById('lang-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const wrapper = document.getElementById('catalogWrapper');
                wrapper.style.display = 'flex';
                renderFlipbook(lang);
            }, 500);
        }

        // دسترسی به تابع از طریق گلوبال
        window.initCatalog = initCatalog;
    </script>
</body>
</html>
