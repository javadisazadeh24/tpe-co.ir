            position: relative;

        /* ================= OVERLAY انتخاب زبان با تذهیب ================= */
        #lang-overlay {
            position: fixed;

            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
            text-align: center;
        }
        .lang-card {

            padding: 50px 40px;
            border-radius: 60px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.5);

            position: relative;
            overflow: hidden;
        }
        .lang-card::before {
            content: "✧";
            font-size: 120px;
            position: absolute;
            bottom: -30px;
            left: -30px;
            opacity: 0.1;
            color: #d4af37;
            transform: rotate(-15deg);
        }
        .lang-card::after {
            content: "✧";
            font-size: 80px;
            position: absolute;
            top: -20px;
            right: -20px;
            opacity: 0.1;
            color: #d4af37;
        }
        .lang-card h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #ffd966;
            font-weight: 700;
        }
        .lang-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px 35px;
            margin: 12px;
            border-radius: 50px;
            cursor: pointer;
            width: 220px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .lang-btn:hover {
            transform: translateY(-5px) scale(1.02);

        }

            font-weight: 600;

        };

        let currentLang = 'fa';
        let flipBook = null;

        // ساخت صفحات به صورت پویا
        function buildPagesHTML(lang) {
            const data = catalogData[lang];
            const pages = [];

            // جلد
            pages.push(`
                <div class="page page-cover">
                    <div style="position:relative; z-index:2;">
                        <div class="cover-logo">${data.cover_title}</div>
                        <div class="cover-sub">${data.cover_sub}</div>
                        <p style="margin-top:40px;"><i class="fa-regular fa-hand-peace"></i> ${lang === 'fa' ? 'ورق بزنید' : (lang === 'en' ? 'Turn the page' : 'اقلب الصفحة')}</p>
                    </div>
                </div>
            `);

            // درباره ما
            pages.push(`
                <div class="page">
                    <div class="page-header"><i class="fa-solid fa-warehouse"></i> ${data.about_title}</div>
                    <p>${data.about_text}</p>
                    <div class="gallery-grid">
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=300&h=200&fit=crop" alt="team"><span>${lang === 'fa' ? 'تیم مهندسی' : 'Engineering Team'}</span></div>
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1581092160609-4f4e7d1c2f3a?w=300&h=200&fit=crop" alt="lab"><span>${lang === 'fa' ? 'آزمایشگاه پیشرفته' : 'Advanced Lab'}</span></div>
                    </div>
                </div>
            `);

            // تجهیزات پزشکی (با لیست)
            let medicalHtml = `<div class="page-header"><i class="fa-solid fa-stethoscope"></i> ${data.medical_title}</div><p>${data.medical_desc}</p><ul class="product-list">`;
            data.medical_items.forEach(item => { medicalHtml += `<li><i class="fa-solid fa-check-circle"></i> ${item}</li>`; });
            medicalHtml += `</ul>`;
            pages.push(`<div class="page">${medicalHtml}</div>`);

            // خدمات صنعتی
            pages.push(`
                <div class="page">
                    <div class="page-header"><i class="fa-solid fa-industry"></i> ${data.industrial_title}</div>
                    <p>${data.industrial_desc}</p>
                    <div class="gallery-grid">
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0?w=300&h=200&fit=crop" alt="packing"><span>${lang === 'fa' ? 'دستگاه بسته‌بندی' : 'Packing Machine'}</span></div>
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1504917595217-d4bf06117361?w=300&h=200&fit=crop" alt="cnc"><span>CNC Machining</span></div>
                    </div>
                </div>
            `);

            // فب‌لب روند
            pages.push(`
                <div class="page">
                    <div class="page-header"><i class="fa-solid fa-cubes"></i> ${data.fablab_title}</div>
                    <p>${data.fablab_desc}</p>
                    <div class="gallery-grid">
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&h=200&fit=crop" alt="3d printer"><span>3D Printer</span></div>
                        <div class="card-img"><img src="https://images.unsplash.com/photo-1581092795360-fd1ca04f0952?w=300&h=200&fit=crop" alt="laser"><span>Laser Cut</span></div>
                    </div>
                </div>
            `);

            // محصولات شاخص (لیست)
            let prodHtml = `<div class="page-header"><i class="fa-solid fa-boxes"></i> ${data.products_title}</div><ul class="product-list">`;
            data.products_list.forEach(p => { prodHtml += `<li><i class="fa-solid fa-cube"></i> ${p}</li>`; });
            prodHtml += `</ul>`;
            pages.push(`<div class="page">${prodHtml}</div>`);

            // خدمات تخصصی (لیست)
            let servHtml = `<div class="page-header"><i class="fa-solid fa-tools"></i> ${data.services_title}</div><ul class="product-list">`;
            data.services_list.forEach(s => { servHtml += `<li><i class="fa-solid fa-wrench"></i> ${s}</li>`; });
            servHtml += `</ul>`;
            pages.push(`<div class="page">${servHtml}</div>`);

            // نمونه کارها (گالری)
            let portHtml = `<div class="page-header"><i class="fa-solid fa-images"></i> ${data.portfolio_title}</div><div class="gallery-grid">`;
            data.portfolio_items.forEach(item => {
                portHtml += `<div class="card-img"><img src="${item.img}" alt="${item.name}"><span>${item.name}</span></div>`;
            });
            portHtml += `</div>`;
            pages.push(`<div class="page">${portHtml}</div>`);

            // تماس با ما (صفحه مخصوص)
            pages.push(`
                <div class="page page-cover" style="background: linear-gradient(145deg, #132a3f, #0f172a);">
                    <div style="text-align:center;">
                        <div class="cover-logo" style="font-size:2rem;">${data.contact_title}</div>
                        <div class="contact-info-card" style="background:rgba(255,255,245,0.1); backdrop-filter:blur(8px); margin-top:30px;">
                            <p><i class="fa-solid fa-location-dot"></i> ${data.contact_address}</p>
                            <p><i class="fa-solid fa-phone"></i> ${data.contact_phone}</p>
                            <p><i class="fa-solid fa-envelope"></i> ${data.contact_email}</p>
                            <p><i class="fa-solid fa-globe"></i> ${data.contact_web}</p>
                        </div>
                        <div style="margin-top:40px;"><i class="fa-brands fa-instagram"></i> <i class="fa-brands fa-linkedin"></i> <i class="fa-brands fa-telegram"></i></div>
                        <p style="margin-top:50px;">© TPE Co. - Digital Catalog</p>
                    </div>
                </div>
            `);
            return pages;
        }

        // رندر کتاب
        function renderFlipbook(lang) {
            const container = document.getElementById('flipbook');
            if (!container) return;
            const pagesHtml = buildPagesHTML(lang);
            container.innerHTML = pagesHtml.join('');
            
            if (flipBook && flipBook.destroy) flipBook.destroy();
            
            flipBook = new St.PageFlip(container, {
                width: 480,
                height: 680,
                size: "stretch",
                minWidth: 320,
                maxWidth: 540,
                minHeight: 520,
                maxHeight: 760,
                showCover: true,
                mobileScrollSupport: false,
                swipeDistance: 25,
                startZIndex: 0,
                maxShadowOpacity: 0.6,
                autoSize: true,
                useMouseEvents: true
            });
            flipBook.loadFromHTML(document.querySelectorAll('.page'));
        }

        // تابع اصلی راه‌اندازی
        function initCatalog(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            if (lang === 'fa' || lang === 'ar') {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }
            // مخفی کردن متن‌های اضافی در overlay
            document.querySelectorAll('.fa, .en, .ar').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.' + lang).forEach(el => el.style.display = 'inline-block');
            
            const overlay = document.getElementById('lang-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const wrapper = document.getElementById('catalogWrapper');
                wrapper.style.display = 'flex';
                renderFlipbook(lang);
            }, 500);
        }

        window.initCatalog = initCatalog;
    </script>
</body>
</html>
