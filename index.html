<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVAND | Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{
  overflow:hidden;
  background:#05050a;
  color:#fff;
}

/* ===== WORLD BACKGROUND ===== */
.world {
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, #1a0f2e 0%, #05050a 60%, #000 100%);
}

/* moving depth layer */
.grid {
  position:absolute;
  inset:-200px;
  background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: drift 12s linear infinite;
  opacity:0.3;
}
@keyframes drift{
  from{transform:translateY(0)}
  to{transform:translateY(80px)}
}

/* ===== CENTRAL CORE ===== */
.core {
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,215,120,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  box-shadow:0 0 80px rgba(255,215,120,0.08);
}

.core h1{
  font-size:18px;
  letter-spacing:6px;
  font-weight:800;
}

.core small{
  opacity:0.6;
  margin-top:8px;
}

/* ===== PORTALS ===== */
.portal {
  position:absolute;
  width:160px;
  height:160px;
  border-radius:40px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  cursor:pointer;
  transition:0.6s;
}

.portal:hover{
  transform:scale(1.15);
  border-color:rgba(255,215,120,0.4);
  box-shadow:0 0 60px rgba(255,215,120,0.15);
}

.portal .title{
  font-weight:700;
  margin-top:10px;
  font-size:14px;
}

.portal .sub{
  font-size:11px;
  opacity:0.6;
  text-align:center;
  padding:0 10px;
}

/* positions */
#creative{left:10%;top:50%;transform:translateY(-50%)}
#industrial{right:10%;top:50%;transform:translateY(-50%)}
#medical{left:50%;top:10%;transform:translateX(-50%)}
#catalog{left:50%;bottom:10%;transform:translateX(-50%)}

/* ===== PARTICLES ===== */
.particle {
  position:absolute;
  width:2px;
  height:2px;
  background:gold;
  border-radius:50%;
  opacity:0.5;
  animation: float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* ===== STORY TEXT ===== */
.story {
  position:absolute;
  bottom:30px;
  right:30px;
  max-width:300px;
  font-size:12px;
  opacity:0;
  transition:0.4s;
  padding:12px 16px;
  border-right:2px solid gold;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}
.story.active{
  opacity:1;
}
</style>
</head>

<body>

<div class="world">
  <div class="grid"></div>

  <div class="core">
    <h1>RAVAND</h1>
    <small>TPE SYSTEM</small>
  </div>

  <div class="portal" id="creative">
    <div>🎨</div>
    <div class="title">Creative</div>
    <div class="sub">Form • Art • Parametric</div>
  </div>

  <div class="portal" id="industrial">
    <div>⚙️</div>
    <div class="title">Industrial</div>
    <div class="sub">CNC • Reverse • Systems</div>
  </div>

  <div class="portal" id="medical">
    <div>🧬</div>
    <div class="title">Medical</div>
    <div class="sub">Precision • Bio • Devices</div>
  </div>

  <div class="portal" id="catalog">
    <div>∞</div>
    <div class="title">Catalog</div>
    <div class="sub">Explore Universe</div>
  </div>

  <div class="story" id="story"></div>
</div>

<script>

const story = document.getElementById("story");

const texts = {
  creative: "ورود به جهان فرم و خلاقیت... جایی که هندسه تبدیل به هنر می‌شود.",
  industrial: "سیستم صنعتی فعال شد... مهندسی معکوس و ساخت در حال اجراست.",
  medical: "دقت وارد فاز زیستی شد... ساختارهای حساس در حال تحلیل هستند.",
  catalog: "دیتابیس جهانی باز شد... ورود به آرشیو کامل پروژه‌ها."
};

function showStory(key){
  story.innerText = texts[key];
  story.classList.add("active");
}

function hideStory(){
  story.classList.remove("active");
}

document.querySelectorAll(".portal").forEach(p=>{
  p.addEventListener("mouseenter", ()=>{
    showStory(p.id);
  });

  p.addEventListener("mouseleave", hideStory);

  p.addEventListener("click", ()=>{
    gsap.to(".world",{opacity:0,duration:0.6,onComplete:()=>{
      window.location.href = "/" + p.id;
    }});
  });
});

/* particles */
for(let i=0;i<40;i++){
  const s=document.createElement("div");
  s.className="particle";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(4+Math.random()*6)+"s";
  document.querySelector(".world").appendChild(s);
}

/* intro animation */
gsap.from(".core",{scale:0,opacity:0,duration:1,ease:"back"});
gsap.from(".portal",{opacity:0,y:50,stagger:0.15,duration:1});

</script>
</body>
</html>
