  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- آیکون مرورگر با لوگوی واقعی -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --primary-light: #60a5fa;
      --accent: #dc2626;
      --gold: #eab308;
      --creative: #a855f7;
      --industrial: #f97316;
      --medical: #06b6d4;
      --catalog: #3b82f6;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      --text-light: #f8fafc;
      --text-dim: #cbd5e1;
    }

    body {
      font-family: 'Vazirmatn', 'Inter', sans-serif;
      background: #050a15;
      color: var(--text-light);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ========== ویدئوی پس‌زمینه (همان هیروی سایت اصلی) ========== */
    .hero-video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      opacity: 0.55;
    }
    .gradient-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 40%, rgba(5, 10, 25, 0.7), rgba(0, 0, 0, 0.85));
      z-index: -2;
    }
    /* خطوط مهندسی متحرک (شیشه‌ای و ظریف) */
    .engineering-lines {
      position: fixed;
      inset: 0;
      background-image: 
        repeating-linear-gradient(0deg, rgba(96, 165, 250, 0.1) 0px, rgba(96, 165, 250, 0.1) 1px, transparent 1px, transparent 70px),
        repeating-linear-gradient(90deg, rgba(96, 165, 250, 0.1) 0px, rgba(96, 165, 250, 0.1) 1px, transparent 1px, transparent 70px);
      background-size: 70px 70px;
      animation: lineShift 25s linear infinite;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes lineShift {
      0% { background-position: 0 0; }
      100% { background-position: 70px 70px; }
    }

    /* ========== نوار زبان (شیشه‌ای) ========== */
    .lang-bar {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 200;
      display: flex;
      gap: 8px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 6px 18px;
      border-radius: 60px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }
    .lang-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 14px;
      border-radius: 40px;
      transition: 0.2s;
      font-family: 'Vazirmatn', sans-serif;
    }
    .lang-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 8px rgba(30, 64, 175, 0.5);
    }

    /* ========== محفظه اصلی ========== */
    .gateway {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    .dashboard {
      max-width: 1400px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      gap: 40px;
      align-items: center;
    }

    /* ========== بخش چپ: چرخ دایره‌ای بی‌نهایت ========== */
    .circular-zone {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 550px;
    }
    .carousel-container {
      position: relative;
      width: 500px;
      height: 500px;
      margin: 0 auto;
    }
    .center-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 170px;
      height: 170px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      z-index: 30;
    }
    .center-logo img {
      width: 85px;
      margin-bottom: 8px;
    }
    .center-logo span {
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0.9;
    }
    /* گره‌های گردان */
    .rotating-item {
      position: absolute;
      width: 145px;
      height: 145px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.3);
      will-change: transform;
    }
    .rotating-item i {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }
    .rotating-item h4 {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .rotating-item:hover {
      transform: scale(1.08);
      border-color: var(--gold);
      background: rgba(30, 64, 175, 0.3);
    }

    /* ========== بخش راست: پنل اطلاعات شیشه‌ای ========== */
    .info-glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 36px;
      padding: 2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s;
    }
    .sector-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sector-desc {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    .services-badge {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 1rem 0 1.5rem;
    }
    .services-badge span {
      background: rgba(255,255,255,0.08);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .glass-cta {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .glass-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    /* اطلاعات تماس (فوتر کوچک) */
    .contact-mini {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .contact-mini a {
      color: var(--text-dim);
      text-decoration: none;
      transition: 0.2s;
    }
    .contact-mini a:hover {
      color: var(--primary-light);
    }
    .social-icons {
      display: flex;
      gap: 12px;
    }
    .social-icons a {
      font-size: 1rem;
    }

    /* موبایل */
    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .carousel-container {
        width: 350px;
        height: 350px;
      }
      .rotating-item {
        width: 110px;
        height: 110px;
      }
      .rotating-item i {
        font-size: 1.6rem;
      }
      .rotating-item h4 {
        font-size: 0.7rem;
      }
      .center-logo {
        width: 120px;
        height: 120px;
      }
      .center-logo img {
        width: 60px;
      }
    }
  </style>
</head>

        cta: "الطب الحديث",
        url: "/fablab/medical"
      },
      catalog: {
        title: "الكتالوج الرقمي",
        desc: "مكتبة تفاعلية تضم أكثر من 250 منتجًا ومشروعًا حقيقيًا من المجالات الإبداعية والصناعية والطبية. أعمال فبلب روند وشركة تطوير پردازان.",
        services: ["قطع صناعية", "نماذج طبية", "تصميم إبداعي", "مشاريع هندسية", "ملفات ثلاثية الأبعاد"],
        cta: "استكشاف البوابة",
        url: "/fablab/explore"
      },
      address: "زاهدان، شارع الجامعة، حديقة العلوم والتكنولوجيا"
    }
  };

  let currentLang = 'fa';
  let currentSector = 'creative';
  let rotationAnimation = null;
  let isHovering = false;

  // عناصر
  const container = document.getElementById('carouselContainer');
  const panelTitle = document.getElementById('panelTitle');
  const panelDesc = document.getElementById('panelDesc');
  const panelServices = document.getElementById('panelServices');
  const panelCta = document.getElementById('panelCta');

  // لیست بخش‌ها
  const sectorsList = ['creative', 'industrial', 'medical', 'catalog'];
  // رنگ‌ها (برای آیکون)
  const sectorColors = {
    creative: '#a855f7',
    industrial: '#f97316',
    medical: '#06b6d4',
    catalog: '#3b82f6'
  };
  // آیکون‌ها
  const sectorIcons = {
    creative: 'fas fa-palette',
    industrial: 'fas fa-industry',
    medical: 'fas fa-microscope',
    catalog: 'fas fa-qrcode'
  };

  // ایجاد گره‌ها در موقعیت‌های دایره (۴ نقطه با فاصله ۹۰ درجه)
  function createNodes() {
    const radius = 180; // شعاع چرخش بر حسب px
    const angles = [ -90, 0, 90, 180 ]; // درجه (بالا، راست، پایین، چپ) - با توجه به RTL کمی تنظیم
    // برای RTL بهتر است: creative بالا، industrial پایین، medical راست، catalog چپ (اما با چرخش طبیعی)
    // ترتیب: creative (زاویه -90), industrial (90), medical (0), catalog (180)
    const order = ['creative', 'industrial', 'medical', 'catalog'];
    const angleMap = {
      creative: -90,
      industrial: 90,
      medical: 0,
      catalog: 180
    };
    order.forEach(sector => {
      const angleRad = (angleMap[sector] * Math.PI) / 180;
      const x = Math.cos(angleRad) * radius;
      const y = Math.sin(angleRad) * radius;
      const node = document.createElement('div');
      node.className = 'rotating-item';
      node.setAttribute('data-sector', sector);
      node.style.left = `calc(50% + ${x}px - 72.5px)`;
      node.style.top = `calc(50% + ${y}px - 72.5px)`;
      node.innerHTML = `
        <i class="${sectorIcons[sector]}" style="color: ${sectorColors[sector]};"></i>
        <h4>${langData[currentLang][sector].title}</h4>
      `;
      container.appendChild(node);
    });
  }

  // به‌روزرسانی پنل اطلاعات
  function updatePanel(sector) {
    const data = langData[currentLang][sector];
    if (!data) return;
    panelTitle.innerText = data.title;
    panelDesc.innerText = data.desc;
    panelServices.innerHTML = data.services.map(s => `<span>${s}</span>`).join('');
    panelCta.innerText = data.cta + ' ←';
    panelCta.href = data.url;
    currentSector = sector;
  }

  // هایلایت گره (بزرگنمایی و بروزرسانی پنل)
  function highlightNode(sector) {
    const nodes = document.querySelectorAll('.rotating-item');
    nodes.forEach(node => {
      if (node.dataset.sector === sector) {
        node.style.transform = 'scale(1.08)';
        node.style.borderColor = '#eab308';
        node.style.backgroundColor = 'rgba(30, 64, 175, 0.25)';
      } else {
        node.style.transform = '';
        node.style.borderColor = '';
        node.style.backgroundColor = '';
      }
    });
    updatePanel(sector);
  }

  // چرخش بی‌نهایت آرام (دور مرکز)
  function startInfiniteRotation() {
    const nodes = document.querySelectorAll('.rotating-item');
    if (nodes.length === 0) return;
    // محاسبه زاویه اولیه هر المان نسبت به مرکز و چرخاندن تدریجی همه با هم به صورت یکپارچه
    // ساده‌ترین روش: چرخش کل کانتینر؟ نه، چون center-logo نباید بچرخد. بهتر است هر گره را روی یک دایره فرضی بچرخانیم.
    // برای چرخش بی‌نهایت، زاویه هر گره را به صورت پیوسته افزایش می‌دهیم.
    let angleOffset = 0;
    const radius = 180;
    const sectorsOrder = ['creative', 'industrial', 'medical', 'catalog'];
    const anglesRef = { creative: -90, industrial: 90, medical: 0, catalog: 180 };
    
    function rotateNodes() {
      angleOffset = (angleOffset + 0.2) % 360; // سرعت آرام
      sectorsOrder.forEach(sector => {
        const node = document.querySelector(`.rotating-item[data-sector="${sector}"]`);
        if (!node) return;
        const baseAngle = anglesRef[sector];
        const newAngleRad = ((baseAngle + angleOffset) * Math.PI) / 180;
        const x = Math.cos(newAngleRad) * radius;
        const y = Math.sin(newAngleRad) * radius;
        node.style.left = `calc(50% + ${x}px - 72.5px)`;
        node.style.top = `calc(50% + ${y}px - 72.5px)`;
      });
      requestAnimationFrame(() => {
        if (!isHovering) {
          rotationFrame = requestAnimationFrame(rotateNodes);
        }
      });
    }
    let rotationFrame = requestAnimationFrame(rotateNodes);
    // ذخیره برای توقف بعدی
    window.currentRotationFrame = rotationFrame;
    // تابع توقف
    window.stopRotation = () => {
      if (window.currentRotationFrame) cancelAnimationFrame(window.currentRotationFrame);
    };
    window.resumeRotation = () => {
      if (!isHovering) {
        if (window.currentRotationFrame) cancelAnimationFrame(window.currentRotationFrame);
        rotationFrame = requestAnimationFrame(rotateNodes);
        window.currentRotationFrame = rotationFrame;
      }
    };
  }

  // اتوهایلایت با چرخش (هر ۵ ثانیه یک بخش برجسته شود)
  let autoHighlightTimer = null;
  let autoIndex = 0;
  function startAutoHighlight() {
    if (autoHighlightTimer) clearInterval(autoHighlightTimer);
    autoHighlightTimer = setInterval(() => {
      if (!isHovering) {
        autoIndex = (autoIndex + 1) % sectorsList.length;
        highlightNode(sectorsList[autoIndex]);
      }
    }, 5500);
  }

  // راه‌اندازی رویدادها
  function bindEvents() {
    const nodes = document.querySelectorAll('.rotating-item');
    nodes.forEach(node => {
      node.addEventListener('mouseenter', () => {
        isHovering = true;
        if (autoHighlightTimer) clearInterval(autoHighlightTimer);
        if (window.stopRotation) window.stopRotation();
        highlightNode(node.dataset.sector);
      });
      node.addEventListener('mouseleave', () => {
        isHovering = false;
        startAutoHighlight();
        if (window.resumeRotation) window.resumeRotation();
      });
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        const sector = node.dataset.sector;
        const url = langData[currentLang][sector].url;
        if (url) window.location.href = url;
      });
    });
  }

  // تغییر زبان
  function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === 'ar' ? 'ar' : (lang === 'fa' ? 'fa' : 'en');
    document.documentElement.dir = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
    // به‌روزرسانی عنوان گره‌ها
    const nodes = document.querySelectorAll('.rotating-item');
    nodes.forEach(node => {
      const sector = node.dataset.sector;
      const title = langData[lang][sector].title;
      const iconHtml = `<i class="${sectorIcons[sector]}" style="color: ${sectorColors[sector]};"></i>`;
      node.innerHTML = `${iconHtml}<h4>${title}</h4>`;
    });
    // به‌روزرسانی آدرس در پنل تماس
    const addressSpan = document.querySelector('[data-i18n="address"]');
    if (addressSpan) addressSpan.innerText = langData[lang].address;
    updatePanel(currentSector);
  }

  // اسپلش و راه‌اندازی اولیه
  window.addEventListener('load', () => {
    createNodes();
    bindEvents();
    startInfiniteRotation();
    startAutoHighlight();
    highlightNode('creative');
    // تنظیم زبان پیش‌فرض
    setLanguage('fa');
    // انیمیشن ورود با GSAP
    gsap.fromTo('.dashboard', { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" });
    gsap.fromTo('.center-logo', { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7, delay: 0.2, ease: "back.out(0.6)" });
  });

  // دکمه‌های زبان
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      setLanguage(btn.dataset.lang);
    });
  });
</script>
</body>
</html>
