  <style>
    /* ================= CSS Variables ================= */
    :root {
      /* Bright & Premium Iranian-Industrial Palette */
      --primary: #1e3a8a; /* Persian Blue */
      --primary-light: #3b82f6;
      --accent-gold: #d97706; /* Traditional Gold */
      --accent-cyan: #0891b2; /* Turquoise/Firoozeh */
      --text-main: #0f172a; /* Slate 900 for readability */
      --text-muted: #475569; /* Slate 600 */
      
      /* Glassmorphism based on your original backup */
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      --glass-hover-shadow: 0 15px 50px rgba(30, 58, 138, 0.15);
      
      --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Vazirmatn', sans-serif;
      color: var(--text-main);
      overflow: hidden; /* Prevent scrolling on gateway */
      background-color: #f8fafc;
    }

    /* ================= Background Video ================= */
    .video-bg-container {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -2;
      background: url('images/hero.jpg') center/cover no-repeat;
    }
    .video-bg-container video {
      width: 100%; height: 100%; object-fit: cover;
    }
    
    /* Light overlay to make the bright glass pop */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(241,245,249,0.6) 100%);
      backdrop-filter: blur(4px);
      z-index: -1;
    }

    /* ================= Splash Screen ================= */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out, visibility 0.6s;
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo img {
      width: 150px;
      animation: pulse 1.5s infinite alternate ease-in-out;
    }
    .splash-text {
      margin-top: 20px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* ================= Header & Lang Switcher ================= */
    header {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none; /* Let clicks pass through empty areas */
    }
    
    .lang-switcher {
      display: flex;
      gap: 5px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 5px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      pointer-events: auto;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .lang-btn.active {
      background: var(--primary);
      color: white;
    }

    /* ================= Main Layout ================= */
    .gateway-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      width: 100vw;
      height: 100vh;
      padding: 20px;
    }

    /* ================= Radial Navigation (Left/Center) ================= */
    .radial-container {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Center Brand Hub */
    .center-hub {
      position: absolute;
      width: 160px;
      height: 160px;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 2px solid var(--glass-border);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(30, 58, 138, 0.2);
      z-index: 10;
      text-align: center;
    }
    .center-hub img {
      width: 80px;
      margin-bottom: 5px;
    }
    .center-hub h1 {
      font-size: 0.75rem;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .center-hub span {
      font-size: 0.6rem;
      color: var(--text-muted);
    }

    /* Orbiting Nodes */
    .orbit-track {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px dashed rgba(30, 58, 138, 0.15); /* Industrial blueprint line */
    }

    .node {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90px;
      height: 90px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glass-shadow);
      cursor: pointer;
      text-align: center;
      transition: box-shadow 0.3s, border-color 0.3s;
      /* Animation handled by JS */
      will-change: transform;
    }
    
    .node:hover, .node.active {
      border-color: var(--accent-gold);
      box-shadow: 0 0 20px rgba(217, 119, 6, 0.3);
      z-index: 20;
    }

    .node i {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 5px;
      transition: var(--transition);
    }
    .node:hover i, .node.active i {
      color: var(--accent-gold);
      transform: scale(1.1);
    }

    .node span {
      font-size: 0.65rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-main);
      padding: 0 5px;
    }

    /* ================= Info Panel (Right) ================= */
    .info-panel {
      position: relative;
      width: 450px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--glass-hover-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Tazhib SVG Background inside Panel */
    .tazhib-bg {
      position: absolute;
      bottom: -50px;
      right: -50px;
      width: 250px;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
      animation: spinSlow 60s linear infinite;
    }
    @keyframes spinSlow { 100% { transform: rotate(360deg); } }

    .panel-content {
      position: relative;
      z-index: 1;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(30, 58, 138, 0.1);
      padding-bottom: 15px;
    }
    .panel-header i {
      font-size: 2rem;
      color: var(--accent-cyan);
    }
    .panel-header h2 {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .panel-desc {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 20px;
      text-align: justify;
    }

    .panel-services {
      list-style: none;
      margin-bottom: 30px;
    }
    .panel-services li {
      position: relative;
      padding-right: 20px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-main);
    }
    html[dir="ltr"] .panel-services li {
      padding-right: 0;
      padding-left: 20px;
    }
    .panel-services li::before {
      content: '\f058'; /* Check-circle */
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 0;
      color: var(--accent-gold);
    }
    html[dir="ltr"] .panel-services li::before {
      right: auto;
      left: 0;
    }

    .btn-enter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), #1e40af);
      color: white;
      text-decoration: none;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
      border: none;
      cursor: pointer;
    }
    .btn-enter:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(30, 58, 138, 0.4);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    /* Contact Footer inside Panel */
    .panel-contact {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .panel-contact div {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-contact i {
      color: var(--primary-light);
    }
    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 5px;
    }
    .social-links a {
      color: var(--primary);
      font-size: 1.1rem;
      transition: var(--transition);
    }
    .social-links a:hover {
      color: var(--accent-gold);
      transform: scale(1.1);
    }

    /* ================= Responsive ================= */
    @media (max-width: 1024px) {
      .gateway-wrapper {
        flex-direction: column;
        justify-content: center;
        gap: 40px;
      }
      .radial-container {
        width: 350px;
        height: 350px;
      }
      .info-panel {
        width: 90%;
        max-width: 500px;
        padding: 30px;
      }
    }

    @media (max-width: 480px) {
      .radial-container {
        width: 280px;
        height: 280px;
      }
      .center-hub {
        width: 110px;
        height: 110px;
      }
      .center-hub img { width: 50px; }
      .node {
        width: 65px;
        height: 65px;
      }
      .node i { font-size: 1rem; }
      .node span { font-size: 0.55rem; }
      .info-panel {
        padding: 20px;
      }
      .panel-header h2 { font-size: 1.2rem; }
      header { justify-content: center; }
    }
  </style>
</head>

        ar: { title: "متجر المنتجات", desc: "وصول مباشر وطلب عبر الإنترنت للمنتجات الجاهزة والملفات ثلاثية الأبعاد وقطع الغيار الصناعية القياسية.", services: ["ملفات ثلاثية الأبعاد جاهزة", "طلب قطع غيار صناعية", "منتجات ديكورية ذكية"] }
      },
      resume: {

        en: { title: "Team Resume", desc: "Meet the multidisciplinary expert team of TPE; a combination of highly experienced mechanical, electrical, and software engineers.", services: ["Mechanical Engineering Team", "Electrical Engineering Team", "Software & Simulation Experts"] },
        ar: { title: "سيرة الفريق", desc: "تعرف على الفريق المتخصص متعدد التخصصات؛ مزيج من مهندسي الميكانيكا والكهرباء والبرمجيات ذوي الخبرة العالية.", services: ["فريق الهندسة الميكانيكية", "فريق الهندسة الكهربائية", "خبراء البرمجيات والمحاكاة"] }
      },
      collab: {
        icon: 'fas fa-handshake',
        url: 'work-with-us.html',
        fa: { title: "همکاری با ما", desc: "اگر ایده‌ای برای ساخت دارید یا به دنبال شریک فنی مطمئن می‌گردید، فبلب روند زیرساخت کامل تبدیل ایده به محصول را ارائه می‌دهد.", services: ["ارسال طرح و کانسپت", "درخواست منتورینگ و مشاوره", "استفاده از تجهیزات فبلب"] },
        en: { title: "Work With Us", desc: "If you have an idea to build or are looking for a reliable technical partner, RAVAND FabLab provides the full infrastructure.", services: ["Submit Concept/Design", "Request Mentoring", "Use FabLab Equipment"] },
        ar: { title: "تعاون معنا", desc: "إذا كان لديك فكرة لبنائها أو تبحث عن شريك فني موثوق، فإن RAVAND FabLab توفر البنية التحتية الكاملة.", services: ["إرسال المفهوم/التصميم", "طلب الإرشاد", "استخدام معدات فبلب"] }
      }
    };

    const staticTranslations = {
      fa: {
        splash: "به اکوسیستم توسعه پردازان خوش آمدید",
        subtitle: "توسعه پردازان",
        cta_btn: "ورود به بخش",
        contact_address: "زاهدان، بلوار دانشگاه، پارک علم و فناوری"
      },
      en: {
        splash: "Welcome to the TPE Ecosystem",
        subtitle: "TPE Co.",
        cta_btn: "Enter Section",
        contact_address: "Zahedan, University Blvd, Science & Technology Park"
      },
      ar: {
        splash: "مرحبًا بكم في نظام TPE",
        subtitle: "توسعه پردازان",
        cta_btn: "الدخول للقسم",
        contact_address: "زاهدان، شارع الجامعة، حديقة العلوم"
      }
    };

    let currentLang = 'fa';
    const keys = Object.keys(siteData);
    const numNodes = keys.length;
    let radius = 200; // Orbit radius
    let currentAngle = 0;
    let isPaused = false;
    let activeKey = 'creative';

    const radialContainer = document.getElementById('radial-container');
    const nodes = [];

    // Initialize Nodes
    function initNodes() {
      // Adjust radius for mobile
      if(window.innerWidth <= 480) radius = 120;
      else if(window.innerWidth <= 1024) radius = 140;

      keys.forEach((key, index) => {
        const node = document.createElement('div');
        node.className = 'node';
        node.dataset.key = key;
        
        node.innerHTML = `
          <i class="${siteData[key].icon}"></i>
          <span>${siteData[key][currentLang].title}</span>
        `;
        
        // Hover/Click events
        node.addEventListener('mouseenter', () => {
          isPaused = true;
          activateNode(key);
        });
        node.addEventListener('mouseleave', () => {
          isPaused = false;
        });
        node.addEventListener('click', () => {
          window.location.href = siteData[key].url;
        });

        radialContainer.appendChild(node);
        nodes.push({ element: node, initialAngle: (360 / numNodes) * index });
      });

      activateNode('creative'); // default
      requestAnimationFrame(animateNodes);
    }

    // Animation Loop
    function animateNodes() {
      if (!isPaused) {
        currentAngle += 0.15; // Rotation speed
      }
      
      nodes.forEach(nodeObj => {
        const angle = nodeObj.initialAngle + currentAngle;
        const radian = angle * (Math.PI / 180);
        
        // Calculate X and Y on the circle
        const x = Math.cos(radian) * radius;
        const y = Math.sin(radian) * radius;
        
        // Apply transform. 
        // 1st translate moves to center, 2nd moves to orbit, 3rd counter-rotates so text stays upright.
        nodeObj.element.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
      });

      requestAnimationFrame(animateNodes);
    }

    // Update Info Panel
    function activateNode(key) {
      activeKey = key;
      nodes.forEach(n => {
        if(n.element.dataset.key === key) n.element.classList.add('active');
        else n.element.classList.remove('active');
      });

      const data = siteData[key];
      const langData = data[currentLang];

      document.getElementById('panel-icon').className = data.icon;
      document.getElementById('panel-title').textContent = langData.title;
      document.getElementById('panel-desc').textContent = langData.desc;
      
      const servicesList = document.getElementById('panel-services');
      servicesList.innerHTML = '';
      langData.services.forEach(srv => {
        const li = document.createElement('li');
        li.textContent = srv;
        servicesList.appendChild(li);
      });

      const cta = document.getElementById('panel-cta');
      cta.href = data.url;
    }

    // Language Handling
    function changeLanguage(lang) {
      currentLang = lang;
      
      // Update HTML attributes
      document.documentElement.lang = lang;
      document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';
      
      // Update Buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      // Update Arrow direction
      const arrow = document.getElementById('cta-arrow');
      arrow.className = (lang === 'en') ? 'fas fa-arrow-right' : 'fas fa-arrow-left';

      // Update Static Texts
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const translationKey = el.dataset.i18n;
        if(staticTranslations[lang][translationKey]) {
          el.textContent = staticTranslations[lang][translationKey];
        }
      });

      // Update Nodes Text
      nodes.forEach(n => {
        const key = n.element.dataset.key;
        n.element.querySelector('span').textContent = siteData[key][lang].title;
      });

      // Refresh Panel
      activateNode(activeKey);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        changeLanguage(e.target.dataset.lang);
      });
    });

    // Handle Splash Screen & Init
    window.addEventListener('load', () => {
      initNodes();
      
      // Short 1.5s Splash Screen
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
      }, 1500);

      // Handle Resize
      window.addEventListener('resize', () => {
        if(window.innerWidth <= 480) radius = 120;
        else if(window.innerWidth <= 1024) radius = 140;
        else radius = 200;
      });
    });
  </script>
</body>
